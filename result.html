<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sei un Connettore — Abstract Entity Atlas</title>
<link rel="stylesheet" href="css/style.css?v=41" />
</head>
<body>

  <header class="nav">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html" aria-label="Abstract Entity Atlas — home">
        <svg class="aea-logo" viewBox="0 0 61 22" width="61" height="22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect class="r1" x="1"  y="1"  width="41" height="8" pathLength="100"/>
          <rect class="r2" x="45" y="1"  width="15" height="8" pathLength="100"/>
          <rect class="r3" x="1"  y="13" width="15" height="8" pathLength="100"/>
          <rect class="r4" x="34" y="13" width="26" height="8" pathLength="100"/>
        </svg>
      </a>
      <nav class="nav-tabs">
        <a href="quiz.html"><span>Take test</span></a>
        <a href="index.html#archetipi"><span>Archetipi</span></a>
        <a href="index.html#progetto"><span>Progetto</span></a>
      </nav>
      <span class="nav-spacer"></span>
      <a class="nav-login" href="#">Login</a>
      <button class="nav-burger" id="burger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="nav-mobile" id="navMobile">
      <a href="quiz.html">Take test</a>
      <a href="index.html#archetipi">Archetipi</a>
      <a href="index.html#progetto">Progetto</a>
      <a href="#">Login</a>
    </nav>
  </header>

  <main class="result-page">
    <figure class="result-figure">
      <img id="resImg" class="d-only" src="assets/img/res-connettore.png" alt="Il tuo risultato — Abstract Entity Atlas" />
      <img id="resImgMobile" class="m-only" src="assets/img/res-connettore-m-top.png" alt="Il tuo risultato — Abstract Entity Atlas" />
    </figure>
    <div class="result-actions">
      <button class="btn-tick" id="downloadBtn">Download ↓</button>
      <button class="btn-tick" id="shareBtn">Condividi ↗</button>
      <a class="btn-tick" href="index.html">Home ⌂</a>
    </div>
    <img id="resFootMobile" class="m-only result-foot" src="assets/img/res-connettore-m-foot.png" alt="" />
  </main>

  <script>
    const burger = document.getElementById('burger');
    const menu = document.getElementById('navMobile');
    burger.addEventListener('click', () => {
      const open = menu.classList.toggle('open');
      burger.setAttribute('aria-expanded', open);
    });

    /* archetype results from Figma !Esempi Archetipi */
    const ARCHETYPES = {
      connettore:   { img: 'res-connettore.png',   name: 'Connettore'   },
      intrattenuto: { img: 'res-intrattenuto.png', name: 'Intrattenuto' },
      aggiornato:   { img: 'res-aggiornato.png',   name: 'Aggiornato'   },
      lavoratore:   { img: 'res-lavoratore.png',   name: 'Lavoratore'   },
      spettatore:   { img: 'res-spettatore.png',   name: 'Spettatore'   },
      consumatore:  { img: 'res-consumatore.png',  name: 'Consumatore'  },
      tifoso:       { img: 'res-tifoso.png',        name: 'Tifoso'       },
      fan:          { img: 'res-fan.png',           name: 'Fan'          }
    };
    const key = (new URLSearchParams(location.search).get('a') || 'connettore').toLowerCase();
    const arch = ARCHETYPES[key] || ARCHETYPES.connettore;
    const base = key in ARCHETYPES ? key : 'connettore';
    document.getElementById('resImg').src = 'assets/img/' + arch.img;
    document.getElementById('resImg').alt = 'Sei un ' + arch.name;
    document.getElementById('resImgMobile').src = 'assets/img/res-' + base + '-m-top.png';
    document.getElementById('resImgMobile').alt = 'Sei un ' + arch.name;
    document.getElementById('resFootMobile').src = 'assets/img/res-' + base + '-m-foot.png';
    document.title = arch.name + ' — Abstract Entity Atlas';

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = 'assets/img/' + arch.img;
      a.download = 'abstract-entity-atlas-' + key + '.png';
      a.click();
    });
    document.getElementById('shareBtn').addEventListener('click', async () => {
      const url = window.location.href;
      if (navigator.share) {
        try { await navigator.share({ title: 'Sono un ' + arch.name, url }); } catch (e) {}
      } else {
        try { await navigator.clipboard.writeText(url); alert('Link copiato negli appunti'); }
        catch (e) { alert(url); }
      }
    });
  </script>
</body>
</html>
